name: Feature Request
description: Propose a product, SDK rail, docs, or developer-experience improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: input
    id: outcome
    attributes:
      label: Desired Outcome
      placeholder: "What should a merchant, customer, developer, or agent be able to do?"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the feature and the expected behavior.
    validations:
      required: true
  - type: input
    id: rails
    attributes:
      label: Receiz Rails
      placeholder: "Example: identity, publicStore, checkout, domains, media, MCP"
  - type: textarea
    id: proof
    attributes:
      label: Proof And Tenant Authority
      description: How should the feature preserve proof authority and tenant scope?
