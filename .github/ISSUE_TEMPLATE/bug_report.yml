name: Bug Report
description: Report a reproducible bug in the app, SDK rail usage, docs, or release flow.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, access tokens, webhook secrets, identity key files, or private identity artifacts.
  - type: input
    id: area
    attributes:
      label: Area
      description: Route, component, SDK rail, or workflow involved.
      placeholder: "Example: app/api/store, publicStore.publish, admin domains"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "local dev, Vercel preview, production, Node version, browser"
  - type: textarea
    id: verification
    attributes:
      label: Verification Run
      placeholder: "`pnpm release:check`, `pnpm receiz:doctor`, browser QA, etc."
